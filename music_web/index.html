<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 音乐下载器</title>
    <style>
        /* 样式保持不变，和之前一样 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .platform-group {
            margin-bottom: 20px;
        }
        
        .platform-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        
        .platform-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .platform-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .platform-btn:hover {
            border-color: #667eea;
        }
        
        .platform-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .search-box input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-box input:focus {
            border-color: #667eea;
        }
        
        .search-box button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .search-box button:hover {
            background: #5a67d8;
        }
        
        .search-box button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .result-stats {
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
        }
        
        .song-list {
            display: none;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .song-item {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .song-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }
        
        .song-item.selected {
            border-color: #667eea;
            background: #e8eaff;
        }
        
        .song-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .song-info {
            font-size: 14px;
            color: #666;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .download-btn {
            margin-top: 20px;
            padding: 15px 30px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            display: none;
            width: 100%;
        }
        
        .download-btn:hover {
            background: #38a169;
        }
        
        .download-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .select-all {
            margin-bottom: 10px;
            display: none;
        }
        
        .select-all button {
            padding: 5px 10px;
            background: #e2e8f0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .select-all button:hover {
            background: #cbd5e0;
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            .song-info {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🎵 音乐下载器</h1>
                <p>搜索、选择、下载你喜欢的音乐</p>
            </div>
            <div class="content">
                <!-- 平台选择 -->
                <div class="platform-group">
                    <label>📀 选择搜索平台（可多选）</label>
                    <div class="platform-buttons" id="platformButtons">
                        {% for key, p in platforms.items() %}
                        <button class="platform-btn" data-platform="{{ key }}">{{ p.display }}</button>
                        {% endfor %}
                        <button class="platform-btn" data-platform="all">全部平台</button>
                    </div>
                </div>
                
                <!-- 搜索框 -->
                <div class="search-box">
                    <input type="text" id="keyword" placeholder="输入歌曲名或歌手名..." onkeypress="if(event.keyCode==13) search()">
                    <button id="searchBtn" onclick="search()">🔍 搜索</button>
                </div>
                
                <!-- 错误提示 -->
                <div class="error" id="errorMsg"></div>
                
                <!-- 加载中 -->
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>正在搜索...</p>
                </div>
                
                <!-- 结果统计 -->
                <div class="result-stats" id="resultStats"></div>
                
                <!-- 全选按钮 -->
                <div class="select-all" id="selectAllDiv">
                    <button onclick="selectAll()">全选</button>
                    <button onclick="clearAll()">取消全选</button>
                </div>
                
                <!-- 歌曲列表 -->
                <div class="song-list" id="songList"></div>
                
                <!-- 下载按钮 -->
                <button class="download-btn" id="downloadBtn" onclick="downloadSelected()">⬇️ 下载选中歌曲</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentSongs = [];
        let selectedSongs = new Set();
        
        // 平台选择
        document.querySelectorAll('.platform-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.dataset.platform === 'all') {
                    const allActive = document.querySelectorAll('.platform-btn.active').length === document.querySelectorAll('.platform-btn:not([data-platform="all"])').length;
                    document.querySelectorAll('.platform-btn:not([data-platform="all"])').forEach(b => {
                        if (!allActive) {
                            b.classList.add('active');
                        } else {
                            b.classList.remove('active');
                        }
                    });
                } else {
                    this.classList.toggle('active');
                }
            });
        });
        
        function getSelectedPlatforms() {
            const selected = [];
            document.querySelectorAll('.platform-btn.active:not([data-platform="all"])').forEach(btn => {
                selected.push(btn.dataset.platform);
            });
            return selected;
        }
        
        async function search() {
            const keyword = document.getElementById('keyword').value.trim();
            if (!keyword) {
                showError('请输入歌曲名');
                return;
            }
            
            const platforms = getSelectedPlatforms();
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('songList').style.display = 'none';
            document.getElementById('resultStats').style.display = 'none';
            document.getElementById('selectAllDiv').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            
            selectedSongs.clear();
            currentSongs = [];
            
            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        keyword: keyword,
                        platforms: platforms
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                currentSongs = data.songs;
                
                if (currentSongs.length === 0) {
                    showError('未找到相关歌曲');
                    return;
                }
                
                displaySongs(currentSongs);
                document.getElementById('resultStats').innerHTML = `📋 找到 ${currentSongs.length} 首歌曲`;
                document.getElementById('resultStats').style.display = 'block';
                document.getElementById('selectAllDiv').style.display = 'block';
                document.getElementById('songList').style.display = 'block';
                
            } catch (error) {
                showError('搜索失败：' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('searchBtn').disabled = false;
            }
        }
        
        function displaySongs(songs) {
            const container = document.getElementById('songList');
            container.innerHTML = '';
            
            songs.forEach((song, index) => {
                const songDiv = document.createElement('div');
                songDiv.className = 'song-item';
                songDiv.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        toggleSelect(index);
                    }
                };
                
                songDiv.innerHTML = `
                    <div class="song-title">${escapeHtml(song.name)} - ${escapeHtml(song.singers)}</div>
                    <div class="song-info">
                        <span>📀 来源: ${escapeHtml(song.platform)}</span>
                        <span>💿 专辑: ${escapeHtml(song.album)}</span>
                        <span>⏱️ 时长: ${song.duration}</span>
                        <span>🎵 格式: ${song.format}</span>
                        <span>📦 大小: ${song.file_size}</span>
                    </div>
                `;
                container.appendChild(songDiv);
            });
            
            updateDownloadButton();
        }
        
        function toggleSelect(index) {
            const songDivs = document.querySelectorAll('.song-item');
            if (selectedSongs.has(index)) {
                selectedSongs.delete(index);
                songDivs[index].classList.remove('selected');
            } else {
                selectedSongs.add(index);
                songDivs[index].classList.add('selected');
            }
            updateDownloadButton();
        }
        
        function selectAll() {
            for (let i = 0; i < currentSongs.length; i++) {
                selectedSongs.add(i);
                const items = document.querySelectorAll('.song-item');
                if (items[i]) items[i].classList.add('selected');
            }
            updateDownloadButton();
        }
        
        function clearAll() {
            selectedSongs.clear();
            document.querySelectorAll('.song-item').forEach(item => {
                item.classList.remove('selected');
            });
            updateDownloadButton();
        }
        
        function updateDownloadButton() {
            const btn = document.getElementById('downloadBtn');
            if (selectedSongs.size > 0) {
                btn.style.display = 'block';
                btn.textContent = `⬇️ 下载选中歌曲 (${selectedSongs.size}首)`;
            } else {
                btn.style.display = 'none';
            }
        }
        
        async function downloadSelected() {
            if (selectedSongs.size === 0) {
                showError('请先选择要下载的歌曲');
                return;
            }
            
            const downloadBtn = document.getElementById('downloadBtn');
            const originalText = downloadBtn.textContent;
            downloadBtn.textContent = '⏳ 下载中...';
            downloadBtn.disabled = true;
            
            let successCount = 0;
            let failCount = 0;
            
            for (const index of selectedSongs) {
                const song = currentSongs[index];
                try {
                    const success = await downloadSingle(song);
                    if (success) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                } catch (error) {
                    console.error('下载失败:', error);
                    failCount++;
                }
            }
            
            downloadBtn.textContent = originalText;
            downloadBtn.disabled = false;
            
            if (successCount > 0) {
                showError(`✅ 成功下载 ${successCount} 首歌曲${failCount > 0 ? `，${failCount} 首失败` : ''}`);
            } else {
                showError(`❌ 下载失败，请重试`);
            }
        }
        
        async function downloadSingle(song) {
            return new Promise(async (resolve) => {
                try {
                    // 使用 temp_id 而不是整个 song 对象
                    const response = await fetch('/download', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ temp_id: song.temp_id })
                    });
                    
                    if (response.ok) {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `${song.name} - ${song.singers}.${song.format.toLowerCase()}`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        resolve(true);
                    } else {
                        const error = await response.json();
                        console.error('下载失败:', error);
                        resolve(false);
                    }
                } catch (error) {
                    console.error('下载请求失败:', error);
                    resolve(false);
                }
            });
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerHTML = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
